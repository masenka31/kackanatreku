{{ define "main" }}
  <article class="container page-wrap article-wrap">
    <header class="article-head mb-4">
      {{ with .CurrentSection }}
        <p class="kicker mb-2"><a href="{{ .RelPermalink }}" class="text-decoration-none">{{ .Title }}</a></p>
      {{ else }}
        <p class="kicker mb-2">O mně</p>
      {{ end }}
      <h1 class="display-6 fw-bold mb-3">{{ .Title }}</h1>
      <p class="post-meta mb-0">{{ .Date.Format "2. 1. 2006" }}</p>
    </header>

    <div class="article-body">
      {{ .Content }}
    </div>

    {{ with .CurrentSection }}
      <footer class="article-footer mt-5 pt-4">
        <a href="{{ .RelPermalink }}" class="btn btn-outline-accent">Zpět do sekce {{ .Title }}</a>
      </footer>
    {{ end }}
  </article>
{{ end }}
